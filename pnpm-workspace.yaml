autoInstallPeers: true

dedupePeerDependents: true

allowBuilds:
  esbuild: true
  simple-git-hooks: true
  unrs-resolver: true

shamefullyHoist: true

shellEmulator: true

strictPeerDependencies: false

overrides:
  fast-uri: ^3.1.3
  # GHSA-96hv-2xvq-fx4p / CVE-2026-48779 (high): memory exhaustion DoS via
  # tiny fragments. Transitive through jsdom -> vitest. Remove once jsdom
  # bumps its own ws dependency past 8.21.0.
  ws: ^8.21.0
