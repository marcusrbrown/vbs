---
name: Fro Bot

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  discussion_comment:
    types: [created]
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, review_requested]
  schedule:
    - cron: '30 3 * * *'
    - cron: '30 15 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: Operation mode
        type: choice
        options:
          - review
          - maintenance
          - autoheal
          - both
        default: review
      prompt:
        description: Custom prompt for review mode
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: >-
    fro-bot-${{
      github.event.issue.number ||
      github.event.pull_request.number ||
      github.event.discussion.number ||
      github.run_id
    }}
  cancel-in-progress: false

env:
  PR_REVIEW_PROMPT: |
    Review this PR for the VBS (View By Stardate) project — a TypeScript +
    Vite + D3.js Star Trek viewing guide using functional factory architecture.
    Read AGENTS.md for full project conventions before reviewing.

    Focus your review on:
    - Correctness and edge cases
    - Security implications (credentials, localStorage, API keys)
    - Breaking changes to public factory APIs or event maps
    - Test coverage for new/changed behavior
    - VBS-specific violations:
      * Missing `.js` extensions in imports (runtime breakage)
      * Use of `any` instead of `unknown` + type guards
      * Class-based patterns instead of functional factories
      * `this` binding instead of closure-based state
      * Missing `destroy()` on components/factories with listeners
      * Inline styles instead of CSS custom properties (`--vbs-` prefix)
      * Missing event map types in `src/modules/types.ts`
    Skip style nits — the linter handles those.

    Do NOT push commits, modify code, or create branches. Review only.
    Use inline comments for file-specific issues. Reserve the review body
    for the structured summary below.

    You MUST structure your review using exactly these headings:
    ## Verdict: [PASS | CONDITIONAL | REJECT]
    CONDITIONAL = can merge after addressing the listed blocking issues.
    ### Blocking issues
    ### Non-blocking concerns
    ### Missing tests
    ### Risk assessment (LOW/MED/HIGH) + rationale
    Evaluate likelihood of regression, security exposure, or blast radius.
    If a section has no items, write "None" under the heading.
    Do not omit any heading.

  MAINTENANCE_PROMPT: |
    Perform daily repository maintenance for VBS (View By Stardate) and update
    a SINGLE rolling issue titled "Daily Maintenance Report" in this repository.

    Search for an issue with this exact title. If multiple matches exist,
    use the most recently updated one. If no open issue exists, create it.
    If the most recent matching issue is closed, reopen it instead of creating
    a new one.

    Perpetual issue hygiene: after selecting the single rolling issue,
    search for any other open issues with the exact title "Daily Maintenance Report"
    and close them with a brief comment (e.g., "Consolidating into the perpetual
    maintenance issue."). There must be exactly one open maintenance issue at all times.
    (This duplicate-closing step is the sole exception to the "no individual
    issue modifications" rule below.)

    Append a new dated section for each run using "## YYYY-MM-DD (UTC)".
    To keep the issue bounded: after appending today's section, replace any
    individual daily sections older than 14 days with a single
    "## Historical Summary" section that lists only the count of prior runs
    and any items that remained unresolved across those runs. If a Historical
    Summary already exists, update it in place — do not create a second one.

    Include links only (no full content duplication). Keep it concise and
    actionable. Flag items that appear in the stale list for the first time
    (not present in the previous dated section) with a ★ marker.

    Sections (in order):
    - Summary metrics (issues opened since last run, currently open PRs, stale
      issues/PRs count, main branch check status, security alerts if accessible)
    - Stale issues (no activity >30 days; recommend next step)
    - Stale PRs (no activity >7 days; stale >14 days)
    - Unassigned bugs (label bug, no assignee)
    - Recommended actions (bulleted checklist)
    - Cross-project intelligence (check marcusrbrown/yield-farmer and
      marcusrbrown/poly for similar maintenance items, security advisories,
      or convention improvements that could benefit VBS; include only if
      relevant findings exist)
    - Notes (use "data unavailable" for any inaccessible data source)

    Do NOT comment on or modify individual issues/PRs (except for closing
    duplicate maintenance issues per the perpetual issue hygiene exception
    above). Do NOT apply labels. Do NOT open PRs. This run must update ONE
    primary issue only (duplicate closures are permitted as the sole exception).

  AUTOHEAL_PROMPT: |
    Perform daily repository autohealing for VBS (View By Stardate) — a
    local-first Star Trek chronological viewing guide built with TypeScript +
    Vite + D3.js, using functional factory architecture with closure-based
    state and generic EventEmitters. Deployed to GitHub Pages at /vbs/.
    Read AGENTS.md for full project conventions before making changes.

    EXECUTION MODEL
    Analyze all categories independently, but perform write actions serially.
    Do not keep multiple branches checked out at once. Complete one mutation,
    return to a clean working tree, then continue.

    DEDUPLICATION (applies to ALL categories)
    Before creating any new PR or issue, search for an existing open
    bot-authored PR/issue for the same root cause. Reuse or update the
    existing item instead of creating a duplicate.

    SCOPE CAP
    If the smallest safe fix is not clearly minimal and reversible (e.g.,
    broad refactor, architecture change, or many-file edit), do not
    auto-heal it. Open or update an issue and log it under "Needs Human
    Attention".

    DEPENDENCY OWNERSHIP
    Renovate owns routine dependency/version bumps (configured via
    marcusrbrown/renovate-config preset). You may change dependency versions
    only when remediating a confirmed security advisory (critical/high) or
    repairing an existing security-update PR. Do not create non-security
    version-bump PRs, and do not batch unrelated dependency changes into a
    security fix. Do NOT modify package.json versions outside category 2
    security remediation.

    1. ERRORED PRs
       Find open PRs with failing CI checks. Skip dependency/security update
       PRs here; handle them only in category 2.
       Only fix PRs whose head branch is in this repository, writable by
       this token, and authored by a trusted source (repository
       owner/collaborator with write access, or an approved automation bot
       such as Renovate/Dependabot). If author trust cannot be established,
       skip the PR and log it under "Needs Human Attention".
       If the PR touches workflows, automation prompts, package-manager
       config, lockfiles, or execution scripts, do not run project commands
       from that branch. Skip it and log why.
       For each fixable PR:
       a. Check out the PR branch.
       b. Read the failing check logs to diagnose the root cause.
       c. Fix the issue (type errors, lint failures, test regressions,
          build breaks).
       d. Commit with a clear message and push to the PR branch.
       e. Comment on the PR explaining what failed and what was fixed.

    2. SECURITY
       Review Dependabot/Renovate alerts and open PRs for vulnerable deps.
       - If a security update PR exists but has conflicts or failures,
         fix and push to that PR branch.
       - For unaddressed critical/high advisories with no existing PR,
         create a new PR with the remediation.
       - Do NOT bulk-update unrelated deps in a security PR.
       If security advisory/alert data is unavailable to the token or CLI,
       skip this category and note "security alerts unavailable" under
       "Needs Human Attention". Do not guess.

    3. CODE QUALITY & REPO HYGIENE
       This category is primarily report-only. Focus on things only a
       code-aware agent can catch:
       - Run `pnpm build` (tsc && vite build). Report any type errors or
         build failures.
       - Run `pnpm test:coverage` and review coverage output. If coverage
         regresses or has gaps in critical modules (progress, storage,
         events, episode-tracker), open or update a single issue with
         failing metrics and top contributing files.
       - Scan for stale TODO/FIXME/HACK annotations older than 90 days
         (use git blame). Collect them into a single issue or update an
         existing "Stale TODOs" issue.
       - Verify VBS convention compliance:
         * No `any`, `@ts-ignore`, or `@ts-expect-error` in src/
         * No class-based patterns (functional factories with closures only)
         * No `this` binding (closures eliminate context issues)
         * All imports use `.js` extensions for ESM resolution
         * No inline styles in .ts files (CSS custom properties only,
           `--vbs-` prefix)
         * All components in src/components/ have `destroy()` method
         * All factory modules have event map types in src/modules/types.ts
         * Error boundaries: public methods wrapped with
           `withErrorHandling()` or `withSyncErrorHandling()`
         Report findings but put actual code fixes into category 4.
       - Check that AGENTS.md files (root, src/modules/, src/components/)
         accurately reflect the current directory structure. If drift is
         found, open a PR with corrections.

    4. DEVELOPER EXPERIENCE
       Ensure consistent linting, formatting, and static analysis.
       Run `pnpm lint`; fix any failures, including convention violations
       found in category 3.
       Open a PR for all fixes — never commit directly to the default
       branch. Group related lint/format/convention fixes into a single PR.

    5. DATA QUALITY
       Validate Star Trek dataset integrity:
       - Run `pnpm exec jiti scripts/validate-episode-data.ts --verbose`
         and report any validation failures.
       - Check for duplicate item IDs across all eras in
         src/data/star-trek-data.ts.
       - Verify ID patterns match conventions:
         Episode: /^[a-z]+_s\d+_e\d+$/
         Season: /^[a-z]+_s\d+$/
         Series: /^[a-z]+(?:_s\d+)?$/
       - Verify chronological ordering within each era.
       Report findings as issues. Do not modify star-trek-data.ts directly
       unless the fix is a clear typo (duplicate ID, malformed pattern).
       For content corrections, open an issue referencing the data-curator
       agent (.github/agents/data-curator.agent.md).

    6. CROSS-PROJECT INTELLIGENCE & SELF-IMPROVEMENT
       Check the latest Daily Maintenance Report and Daily Autohealing Report
       issues (or equivalent perpetual summary issues) in
       marcusrbrown/yield-farmer and marcusrbrown/poly. If those repos have
       recently fixed a class of issue (e.g., a shared dependency security
       advisory, a CI configuration improvement, or a convention change) that
       also applies to VBS, apply the same fix here or open an issue with the
       details. If you identify a recurring pattern that could be prevented by
       updating this workflow prompt or AGENTS.md, open a PR with the proposed
       improvement. This ensures progressive improvement across all projects.

    Hard boundaries:
    - Never force-push, rewrite history, or delete branches.
    - Never push directly to the default branch. Direct pushes are allowed
      only to an existing non-default PR branch you are repairing under
      category 1 or category 2.
    - Never merge PRs, submit reviews/approvals, close/reopen PRs or
      issues, or modify branch protection, EXCEPT for closing duplicate
      "Daily Autohealing Report" issues as described in the perpetual issue
      hygiene section below. This workflow may only push fixes, open/update
      PRs, open/update issues, and comment on PRs when a fix was pushed.
    - Never modify secrets, org settings, environments, or branch
      protection.
    - Never make checks pass by disabling tests, deleting failing
      assertions, lowering coverage budgets, weakening lint/type rules,
      or editing workflows/configuration only to suppress failures.
    - If the smallest safe fix would weaken a guardrail or reduce
      validation, skip it and log it under "Needs Human Attention".
    - Do not create multiple summary issues.

    Project conventions (MUST follow for code changes):
    - TypeScript strict mode: no `any`, no `@ts-ignore`, no `@ts-expect-error`
    - Functional factories only: no classes, no `this` binding
    - Closure-based state: private state in factory closures, public API returned
    - Generic EventEmitters: `createEventEmitter<TEventMap>()` for type-safe events
    - ESM imports: `.js` extensions required in all imports
    - Single quotes for string literals
    - Error handling: `withErrorHandling()` (async) / `withSyncErrorHandling()`
    - Components: provide `destroy()` for cleanup, co-locate .ts + .css
    - CSS: custom properties with `--vbs-` prefix, no inline styles
    - Package manager: pnpm (not npm/yarn)
    - YAML extension: .yaml, not .yml

    OUTPUT FORMAT — SINGLE PERPETUAL ISSUE
    After completing all work, find or create a SINGLE rolling issue titled
    "Daily Autohealing Report" (no date in the title).

    Perpetual issue hygiene: search for any other open issues with titles
    matching "Daily Autohealing Report" or "Daily Autohealing Report — YYYY-MM-DD"
    and close them, keeping only the most recently updated one. If the most
    recent issue has a dated title, rename it to the perpetual title. There
    must be exactly one open autohealing issue at all times.

    Append a new dated section for each run using
    "## Daily Autohealing Report — YYYY-MM-DD (UTC)".
    To keep the issue bounded: after appending today's section, replace any
    individual daily sections older than 14 days with a single
    "## Historical Summary" section that lists only the count of prior runs
    and any items that remained unresolved across those runs. If a Historical
    Summary already exists, update it in place — do not create a second one.

    The issue body MUST use this structure. If a section has no rows, do
    not emit an empty table — write "None." directly under that heading.

    ## Daily Autohealing Report — YYYY-MM-DD (UTC)

    ### Errored PRs
    | PR | Failure | Fix | Status |
    | --- | --- | --- | --- |
    | #N | [root cause] | [what was fixed] | ✅ Fixed / ⚠️ Needs review |

    ### Security
    | Advisory / PR | Severity | Action Taken |
    | --- | --- | --- |
    | [advisory or #N] | Critical/High/Medium | [fix pushed / PR created / skipped] |

    ### Code Quality & Repo Hygiene
    | Check | Result | Action |
    | --- | --- | --- |
    | Build (tsc + Vite) | ✅ Pass / ❌ Fail | [details or #N] |
    | Test coverage | ✅ Healthy / ⚠️ Regressed | [details or #N] |
    | Stale TODOs | N found | [#N or None] |
    | Convention drift | ✅ Clean / ⚠️ Issues | [details or #N] |
    | AGENTS.md accuracy | ✅ Current / ⚠️ Drifted | [#N or None] |

    ### Developer Experience
    - [list of each PR or commit-sized fix with summary link]

    ### Data Quality
    | Check | Result | Action |
    | --- | --- | --- |
    | Validation script | ✅ Pass / ❌ Fail | [details or #N] |
    | Duplicate IDs | ✅ None / ❌ Found | [details or #N] |
    | ID pattern compliance | ✅ Valid / ⚠️ Issues | [details or #N] |
    | Chronological order | ✅ Correct / ⚠️ Issues | [details or #N] |

    ### Cross-Project Intelligence
    - [any patterns or fixes imported from yield-farmer or poly, or "None"]

    ### Needs Human Attention
    - [items that could not be auto-fixed, with context]

    Do NOT create multiple issues. Do NOT comment on individual issues.
    Produce exactly one summary issue per run.

jobs:
  fro-bot:
    name: Fro Bot
    runs-on: ubuntu-latest
    if: >-
      (
        github.event.pull_request == null ||
        (
          !github.event.pull_request.head.repo.fork &&
          !endsWith(github.event.pull_request.user.login || '', '[bot]')
        )
      ) && (
        (
          github.event_name == 'issues' &&
          !endsWith(github.event.issue.user.login || '', '[bot]') &&
          (github.event.issue.user.login || '') != 'fro-bot'
        ) ||
        (
          github.event_name == 'pull_request' &&
          !endsWith(github.event.pull_request.user.login || '', '[bot]') &&
          (github.event.pull_request.user.login || '') != 'fro-bot'
        ) ||
        (
          github.event_name == 'schedule' &&
          github.event.schedule == '30 15 * * *'
        ) ||
        (
          github.event_name == 'workflow_dispatch' &&
          contains(fromJSON('["review", "maintenance", "both"]'), inputs.mode || 'review')
        ) ||
        (
          (github.event_name == 'issue_comment' ||
           github.event_name == 'pull_request_review_comment' ||
           github.event_name == 'discussion_comment') &&
          contains(github.event.comment.body || '', '@fro-bot') &&
          (github.event.comment.user.login || '') != 'fro-bot' &&
          contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association || '')
        )
      )
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: >-
            ${{
              (github.event.issue.pull_request && format('refs/pull/{0}/head', github.event.issue.number))
              || github.event.pull_request.head.sha
              || ''
            }}
          token: ${{ secrets.FRO_BOT_PAT }}

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Build project
        run: pnpm build

      - name: Validate review mode inputs
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'review'
        env:
          PROMPT: ${{ inputs.prompt }}
        run: |
          if [ -z "$PROMPT" ]; then
            echo "::error::Review mode requires a custom prompt. Provide one via the 'prompt' input, or choose a different mode."
            exit 1
          fi

      - name: Run Fro Bot
        uses: fro-bot/agent@45b855241e09e2ed6453d2d97bcc030aa7934da6 # v0.43.3
        env:
          OPENCODE_PROMPT_ARTIFACT: 'true'
          PROMPT: >-
            ${{
              (github.event_name == 'workflow_dispatch' && inputs.mode == 'maintenance' && env.MAINTENANCE_PROMPT)
              || (github.event_name == 'workflow_dispatch' && inputs.mode == 'both' && env.MAINTENANCE_PROMPT)
              || (github.event_name == 'workflow_dispatch' && inputs.mode == 'review' && inputs.prompt)
              || (github.event_name == 'schedule' && github.event.schedule == '30 15 * * *' && env.MAINTENANCE_PROMPT)
              || (github.event_name == 'pull_request' && env.PR_REVIEW_PROMPT)
              || ''
            }}
        with:
          auth-json: ${{ secrets.OPENCODE_AUTH_JSON }}
          github-token: ${{ secrets.FRO_BOT_PAT }}
          model: ${{ vars.FRO_BOT_MODEL }}
          omo-providers: ${{ secrets.OMO_PROVIDERS }}
          prompt: ${{ env.PROMPT }}
          timeout: 0

  fro-bot-autoheal:
    name: Fro Bot Autoheal
    runs-on: ubuntu-latest
    concurrency:
      group: fro-bot-autoheal
      cancel-in-progress: false
    if: >-
      (
        github.event_name == 'schedule' &&
        github.event.schedule == '30 3 * * *'
      ) ||
      (
        github.event_name == 'workflow_dispatch' &&
        contains(fromJSON('["autoheal", "both"]'), inputs.mode || 'autoheal')
      )
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.FRO_BOT_PAT }}

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Build project
        run: pnpm build

      - name: Run Fro Bot
        uses: fro-bot/agent@45b855241e09e2ed6453d2d97bcc030aa7934da6 # v0.43.3
        env:
          OPENCODE_PROMPT_ARTIFACT: 'true'
          PROMPT: ${{ env.AUTOHEAL_PROMPT }}
        with:
          auth-json: ${{ secrets.OPENCODE_AUTH_JSON }}
          github-token: ${{ secrets.FRO_BOT_PAT }}
          model: ${{ vars.FRO_BOT_MODEL }}
          omo-providers: ${{ secrets.OMO_PROVIDERS }}
          prompt: ${{ env.PROMPT }}
          timeout: 0
