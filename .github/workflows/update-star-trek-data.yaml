name: Update Star Trek Data

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 09:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: Generation mode (full or incremental)
        required: false
        default: full
        type: choice
        options:
          - full
          - incremental
      series:
        description: Target specific series (optional, e.g., discovery, picard)
        required: false
        type: string
      dry_run:
        description: Dry run mode (preview changes without creating PR)
        required: false
        default: false
        type: boolean

concurrency:
  group: update-star-trek-data
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  generate-data:
    name: Generate Star Trek Data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Grant write permissions only to this job
    permissions:
      contents: write
      pull-requests: write

    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
      - id: get-app-token
        name: Get GitHub App Installation Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APPLICATION_ID }}
          private-key: ${{ secrets.APPLICATION_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history needed for change detection
          fetch-depth: 0
          token: ${{ steps.get-app-token.outputs.token }}

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - id: get-user-id
        name: Configure git identity
        env:
          GH_TOKEN: ${{ steps.get-app-token.outputs.token }}
        run: |
          name="${{ steps.get-app-token.outputs.app-slug }}[bot]"
          user_id=$(gh api "/users/${name}" --jq .id)
          email="${user_id}+${name}@users.noreply.github.com"
          echo "user-email=${email}" >> "$GITHUB_OUTPUT"
          echo "user-name=${name}" >> "$GITHUB_OUTPUT"
          git config --global user.email "${email}"
          git config --global user.name "${name}"

      - name: Generate Star Trek data
        id: generate
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          set -e

          summary_path="$RUNNER_TEMP/star-trek-data-summary.json"
          diff_path="$RUNNER_TEMP/data-changes.diff"
          generated_at="$(date -u +"%Y-%m-%d %H:%M:%S UTC")"

          echo "summary_path=${summary_path}" >> "$GITHUB_OUTPUT"
          echo "diff_path=${diff_path}" >> "$GITHUB_OUTPUT"
          echo "generated_at=${generated_at}" >> "$GITHUB_OUTPUT"

          # Build command with options
          CMD=(
            "pnpm" "exec" "jiti" "scripts/generate-star-trek-data.ts"
            "--no-cache"
            "--no-backup"
            "--summary-output" "$summary_path"
          )

          # Add mode flag (from manual input or default to 'full')
          MODE="${{ github.event.inputs.mode || 'full' }}"
          CMD+=("--mode" "$MODE")

          # Add series filter if specified
          if [ -n "${{ github.event.inputs.series }}" ]; then
            CMD+=("--series" "${{ github.event.inputs.series }}")
          fi

          # Add dry-run flag if specified
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            CMD+=("--dry-run")
          fi

          # Add verbose logging for CI visibility
          CMD+=("--verbose")

          printf 'Running command:'
          printf ' %q' "${CMD[@]}"
          echo
          "${CMD[@]}"

          if [ -f "$summary_path" ]; then
            {
              echo "summary_json<<EOF"
              cat "$summary_path"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

          # Capture generation status
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Check for data changes
        id: changes
        if: steps.generate.outputs.status == 'success' && github.event.inputs.dry_run != 'true'
        run: |
          set -e

          # Check if star-trek-data.ts has changes
          if git diff --quiet src/data/star-trek-data.ts; then
            echo "No changes detected in star-trek-data.ts"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected in star-trek-data.ts"
            echo "has_changes=true" >> $GITHUB_OUTPUT

            # Generate diff summary for PR body
            DIFF_STATS=$(git diff --stat src/data/star-trek-data.ts)
            echo "diff_stats<<EOF" >> $GITHUB_OUTPUT
            echo "$DIFF_STATS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT

            # Get detailed diff for review
            git diff src/data/star-trek-data.ts > "${{ steps.generate.outputs.diff_path }}"
          fi

      - name: Create Pull Request
        id: create_pr
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          token: ${{ steps.get-app-token.outputs.token }}
          commit-message: 'chore(data): update Star Trek data'
          committer: '${{ steps.get-user-id.outputs.user-name }} <${{ steps.get-user-id.outputs.user-email }}>'
          author: '${{ steps.get-user-id.outputs.user-name }} <${{ steps.get-user-id.outputs.user-email }}>'
          sign-commits: true
          branch: automated-data-update
          delete-branch: false
          title: Update Star Trek data
          add-paths: |
            src/data/star-trek-data.ts
          body: |
            ## Automated Star Trek Data Update

            This PR contains automated updates to the Star Trek episode and movie data.

            ### Changes Summary

            ```
            ${{ steps.changes.outputs.diff_stats }}
            ```

            ### Generation Details

            - **Mode:** ${{ github.event.inputs.mode || 'full' }}
            - **Series Filter:** ${{ github.event.inputs.series || 'all' }}
            - **Generated At:** ${{ steps.generate.outputs.generated_at }}
            - **Workflow Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ### Quality Summary

            - **Average Quality Score:** ${{ fromJson(steps.generate.outputs.summary_json).quality.averageQualityScorePercent }}%
            - **Quality Threshold:** ${{ fromJson(steps.generate.outputs.summary_json).quality.qualityThresholdPercent }}%
            - **Items Above Threshold:** ${{ fromJson(steps.generate.outputs.summary_json).quality.itemsAboveThreshold }}
            - **Items Below Threshold:** ${{ fromJson(steps.generate.outputs.summary_json).quality.itemsBelowThreshold }}
            - **Validation Issues:** ${{ fromJson(steps.generate.outputs.summary_json).quality.totalValidationIssues }}
            - **Duplicate IDs:** ${{ fromJson(steps.generate.outputs.summary_json).validation.duplicateIds }}

            ### Validation Status

            ✅ Data generation completed successfully
            ✅ Integrated script quality validation completed

            ### Review Checklist

            - [ ] Review data changes for accuracy
            - [ ] Verify no manual edits were overwritten
            - [ ] Check quality metrics are acceptable
            - [ ] Confirm new content is properly categorized

            ---

            *This PR was automatically generated by the [Update Star Trek Data workflow](${{ github.server_url }}/${{ github.repository }}/actions/workflows/update-star-trek-data.yaml).*

            **Security Note:** This PR requires manual review and approval before merging to ensure data quality and prevent potential issues.
          labels: |
            automated
            data-update
          draft: false
          assignees: ${{ github.repository_owner }}

      - name: Close superseded legacy data PRs
        if: steps.create_pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ steps.get-app-token.outputs.token }}
          CURRENT_PR_NUMBER: ${{ steps.create_pr.outputs.pull-request-number }}
        run: |
          set -e

          gh pr list --state open --json number,title --limit 100 \
            | jq -r '.[] | select(.title | startswith("Update Star Trek data -")) | .number' \
            | while read -r pr_number; do
                if [ "${pr_number}" != "${CURRENT_PR_NUMBER}" ]; then
                  gh pr close "${pr_number}" --comment "Superseded by perpetual data update PR #${CURRENT_PR_NUMBER}"
                fi
              done

      - name: Upload diff artifact
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: data-changes-diff
          path: ${{ steps.generate.outputs.diff_path }}
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## Star Trek Data Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.generate.outputs.status }}" = "success" ]; then
            echo "✅ Data generation: **Success**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Data generation: **Failed**" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -n "${{ steps.generate.outputs.summary_json }}" ]; then
            echo "### Data Quality Metrics" >> $GITHUB_STEP_SUMMARY
            echo "- Average quality score: **${{ fromJson(steps.generate.outputs.summary_json).quality.averageQualityScorePercent }}%**" >> $GITHUB_STEP_SUMMARY
            echo "- Validation issues: **${{ fromJson(steps.generate.outputs.summary_json).quality.totalValidationIssues }}**" >> $GITHUB_STEP_SUMMARY
            echo "- Duplicate IDs: **${{ fromJson(steps.generate.outputs.summary_json).validation.duplicateIds }}**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.changes.outputs.has_changes }}" = "true" ]; then
            echo "📝 Changes detected: **Yes**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Pull Request:** ${{ steps.create_pr.outputs.pull-request-url }}" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.changes.outputs.has_changes }}" = "false" ]; then
            echo "📝 Changes detected: **No** (data is up to date)" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "ℹ️ **Dry run mode** - no PR was created" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Star Trek data update workflow failed. Check logs for details."
          echo "## ❌ Workflow Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The Star Trek data update workflow encountered an error." >> $GITHUB_STEP_SUMMARY
          echo "Please review the workflow logs for details." >> $GITHUB_STEP_SUMMARY
